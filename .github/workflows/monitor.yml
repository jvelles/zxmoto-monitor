name: Zxmoto 500RR Monitor

on:
  schedule:
    - cron: '*/15 * * * *'   # Comprueba reservas cada 15 minutos
    - cron: '0 */2 * * *'    # Heartbeat cada 2 horas (aviso "sigo activo")
  workflow_dispatch:

jobs:
  check-zxmoto:
    name: Comprobar zxmoto.es
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Ejecutar monitor
        run: node checker-cloud.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          HEARTBEAT: ${{ github.event.schedule == '0 */2 * * *' && 'true' || 'false' }}
